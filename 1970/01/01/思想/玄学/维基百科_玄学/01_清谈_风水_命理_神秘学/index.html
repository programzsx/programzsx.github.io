  <div class="post-body">
    <p><code>玄学</code>是盛于<code>魏晋南北朝</code>的<code>哲学思潮</code>，</p>
<p>本来以解释<code>三玄</code>（<code>《老子》</code>、<code>《庄子》</code>和<code>《周易》</code>）为主，</p>
<p>后来发展成<code>讨论</code>和<code>解释</code>其他道家、儒家<code>经典</code>的<code>清谈风气</code>。</p>
<blockquote>
<p>讨论和解释。对吧。这就是清谈。</p>
</blockquote>
<p>由于在现代，<code>“玄学”</code>一词已转变为<code>风水命理神秘学</code>等意思，所以现今多被称为<code>魏晋玄学</code>。</p>
<blockquote>
<p>风水、命理、神秘学</p>
</blockquote>
