      <p>晋朝</p>
<p><code>266年</code>2月4日—<code>420年</code>7月10日</p>
<p>是中国历史的朝代之一，</p>
<p>史分<code>西晋</code>与<code>东晋</code>时期。</p>
<p>上承<code>三国</code>，下启<code>南北朝</code>，因晋朝皇室复姓<code>司马</code>，所以又称<code>司马晋</code>。</p>
<p>晋朝又分为两个时期，即<code>西晋（265年－316年）</code>与<code>东晋（317年－420年）</code>，合称<code>“两晋”</code>，国祚<code>154年</code>。</p>
<p>西晋为晋武帝<mark>司马炎</mark>所建立，首都为<code>洛阳</code>；</p>
<p>东晋为晋元帝<mark>司马睿</mark>所建立，首都为<code>建康</code>（今江苏省<code>南京市</code>）。</p>
